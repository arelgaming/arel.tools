<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="512" height="512" fill="#0c0d0f"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" stroke="#232630" stroke-width="14" fill="none"/>

  <!-- Subtle diagonal cross lines -->
  <line x1="66" y1="66" x2="446" y2="446" stroke="#ffffff" stroke-width="9" opacity="0.03"/>
  <line x1="446" y1="66" x2="66" y2="446" stroke="#ffffff" stroke-width="9" opacity="0.03"/>

  <!-- Mid ring -->
  <circle cx="256" cy="256" r="82" stroke="#3a4055" stroke-width="11" fill="none"/>

  <!-- Corner tick marks -->
  <line x1="404" y1="94" x2="378" y2="120" stroke="#2a2d36" stroke-width="11"/>
  <line x1="404" y1="418" x2="378" y2="392" stroke="#2a2d36" stroke-width="11"/>
  <line x1="94" y1="418" x2="120" y2="392" stroke="#2a2d36" stroke-width="11"/>
  <line x1="94" y1="94" x2="120" y2="120" stroke="#2a2d36" stroke-width="11"/>

  <!-- North arrow — primary accent -->
  <polygon points="256,36 272,174 256,212 240,174" fill="#7a8499"/>

  <!-- South arrow — dim -->
  <polygon points="256,476 268,310 256,302 244,310" fill="#3a4055"/>

  <!-- East arrow — dim -->
  <polygon points="476,256 310,268 302,256 310,244" fill="#3a4055"/>

  <!-- West arrow — dimmest -->
  <polygon points="36,256 166,268 212,256 166,244" fill="#2e3240"/>

  <!-- North cardinal dot -->
  <circle cx="256" cy="36" r="20" fill="#b8bfcc"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="42" stroke="#6e7585" stroke-width="9" fill="#0c0d0f"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="18" fill="#d4dae6"/>

</svg>
